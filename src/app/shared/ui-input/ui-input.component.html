<div class="field-group" [class.field-group--error]="hasError || error">
  @if (label) {
    <label class="field-label">{{ label }}</label>
  }
  <div class="input-wrap">
    @if (icon) {
      <span class="input-icon material-icons">{{ icon }}</span>
    }
    <input
      [type]="inputType"
      [value]="value"
      [placeholder]="placeholder"
      [autocomplete]="autocomplete"
      [disabled]="disabled"
      (input)="onInput($event)"
      (blur)="onBlur()"
      class="input-field"
    />
    @if (showToggle || type === 'password') {
      <button type="button" class="toggle-pw" (click)="toggleVisibility()" tabindex="-1">
        <span class="material-icons">{{ showPassword() ? 'visibility_off' : 'visibility' }}</span>
      </button>
    }
  </div>
  @if (error) {
    <span class="field-error">{{ error }}</span>
  }
</div>
