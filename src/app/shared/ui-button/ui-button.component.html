<button
  [type]="type"
  class="btn"
  [class]="'btn--' + variant + ' btn--' + size"
  [class.btn--full]="fullWidth"
  [class.btn--loading]="loading"
  [disabled]="disabled || loading"
>
  @if (loading) {
    <span class="btn__spinner"></span>
  } @else if (icon) {
    <span class="material-icons btn__icon">{{ icon }}</span>
  }

  <ng-content />

  @if (iconAfter && !loading) {
    <span class="material-icons btn__icon">{{ iconAfter }}</span>
  }
</button>
