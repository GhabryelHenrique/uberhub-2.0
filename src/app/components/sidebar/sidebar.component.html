<div class="sidebar">
  <div class="logo">
    <img src="assets/logoube.png" alt="Logo" class="logo-full">
  </div>

  <nav class="nav-menu">
    <div class="menu-section">
      <div class="nav-item" routerLink="/dashboard" routerLinkActive="active" title="Dashboard">
        <i class="fas fa-th-large"></i>
        <span>Dashboard</span>
      </div>
    </div>

    <div class="menu-section">
      <div class="section-title">ECOSSISTEMA</div>
      <div class="nav-item" routerLink="/startups" routerLinkActive="active" title="Startups">
        <i class="fas fa-rocket"></i>
        <span>Startups</span>
      </div>
      <div class="nav-item" title="Empresas Tech">
        <i class="fas fa-building"></i>
        <span>Empresas Tech</span>
      </div>
      <div class="nav-item" routerLink="/mapa-inovacao" routerLinkActive="active" title="Mapa da Inovação">
        <i class="fas fa-map-marked-alt"></i>
        <span>Mapa da Inovação</span>
      </div>
    </div>

    <div class="menu-section">
      <div class="section-title">INFORMAÇÕES</div>
      <div class="nav-item" routerLink="/vagas" routerLinkActive="active" title="Vagas">
        <i class="fas fa-briefcase"></i>
        <span>Vagas</span>
      </div>
      <div class="nav-item" routerLink="/eventos" routerLinkActive="active" title="Eventos">
        <i class="fas fa-calendar-alt"></i>
        <span>Eventos</span>
      </div>
      <div class="nav-item" routerLink="/noticias" routerLinkActive="active" title="Notícias">
        <i class="fas fa-newspaper"></i>
        <span>Notícias</span>
      </div>
      <div class="nav-item" title="Oportunidades">
        <i class="fas fa-lightbulb"></i>
        <span>Oportunidades</span>
      </div>
      <div class="nav-item" title="Investimentos">
        <i class="fas fa-chart-line"></i>
        <span>Investimentos</span>
      </div>
      <div class="nav-item" title="Benefícios">
        <i class="fas fa-gift"></i>
        <span>Benefícios</span>
      </div>
      <div class="nav-item" title="Contato">
        <i class="fas fa-envelope"></i>
        <span>Contato</span>
      </div>
    </div>
  </nav>

  <div class="sidebar-footer">
    <div class="notifications">
      <i class="fas fa-bell"></i>
      <span class="badge">2</span>
    </div>

    <div class="user-profile-wrapper">
      <div class="user-profile" (click)="toggleDropdown()">
        <div class="avatar">UU</div>
        <span class="user-name">Usuário Usuário UBERHUB</span>
        <i class="fas fa-chevron-down"></i>
      </div>

      <div class="user-dropdown" [class.active]="isDropdownOpen">
        <div class="dropdown-header">
          <span class="dropdown-user-name">Usuário Usuário UBERHUB</span>
        </div>

        <a class="dropdown-item" (click)="navigateTo('/perfil')">
          <i class="far fa-user"></i>
          <span>Meus Dados</span>
        </a>

        <a class="dropdown-item" (click)="navigateTo('/admin')">
          <i class="far fa-plus-square"></i>
          <span>Startup ou Empresa</span>
        </a>

        <a class="dropdown-item" (click)="navigateTo('/perfil')">
          <i class="far fa-question-circle"></i>
          <span>Contato</span>
        </a>

        <div class="dropdown-divider"></div>

        <a class="dropdown-item logout" (click)="logout()">
          <i class="fas fa-sign-out-alt"></i>
          <span>Sair</span>
        </a>
      </div>
    </div>
  </div>

  <!-- Overlay para fechar dropdown ao clicar fora -->
  <div class="dropdown-overlay" *ngIf="isDropdownOpen" (click)="closeDropdown()"></div>
</div>
